version: "3.8"

services:

  request-approval-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: request-approval-service
    restart: unless-stopped

    ports:
      - "8080:8080"

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/requestApprovalDb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "@Collins20"

    networks:
      - approval-network

  postgres:
    image: postgres:16

    container_name: approval-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: requestApprovalDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "@Collins20"

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - approval-network

  pgadmin:
    image: dpage/pgadmin4

    container_name: approval-pgadmin

    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@approval.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - postgres

    networks:
      - approval-network

volumes:
  postgres_data:

networks:
  approval-network: